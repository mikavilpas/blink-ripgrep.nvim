---
name: Run tests
on:
  pull_request: ~
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  build:
    name: "${{ matrix.neovim.name }} / ${{ matrix.blink.name }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        neovim:
          - name: nvim-stable
            version: stable
          - name: nvim-nightly
            version: nightly
        blink:
          - name: blink-stable
            appname: nvim
          - name: blink-nightly
            appname: nvim_blink_nightly

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install tools with UBI
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          # make the tools available for subsequent steps
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          curl --silent --location \
              https://raw.githubusercontent.com/houseabsolute/ubi/master/bootstrap/bootstrap-ubi.sh |
              TARGET="$HOME/.local/bin" sh

          ubi --project mikefarah/yq

          VERSION=$(yq '.tools."github:BurntSushi/ripgrep".version' mise.toml)
          ubi --project BurntSushi/ripgrep --tag "$VERSION" --exe rg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lua tests
        uses: nvim-neorocks/nvim-busted-action@bbcfe82d35b8fb4660ef6ed4124e1fd9cef4688b # v1.2.0
        with:
          nvim_version: ${{ matrix.neovim.version }}
          luarocks_version: "3.11.1"

      # https://github.com/cypress-io/github-action?tab=readme-ov-file#pnpm-workspaces
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/.cache/Cypress
          key: my-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install
      - name: Run end-to-end tests
        env:
          NVIM_APPNAME: ${{ matrix.blink.appname }}
        run: |
          rg --version
          pnpm tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name:
            cypress-screenshots-${{ matrix.neovim.name }}-${{ matrix.blink.name
            }}
          path: integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

  required-checks:
    name: test-matrix-success
    if: always()
    needs:
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Aggregate matrix result
        if: needs.build.result != 'success'
        run: exit 1
